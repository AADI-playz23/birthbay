<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ruby!</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --accent: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* --- DECORATIVE PHOTO FRAMES --- */
        .frame {
            position: absolute;
            width: 140px;
            background: white;
            padding: 8px 8px 25px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10;
            border: 1px solid #eee;
            transition: transform 0.3s ease;
            animation: floatFrame 4s ease-in-out infinite;
        }
        
        .frame img { width: 100%; height: 160px; object-fit: cover; }
        .frame:hover { transform: scale(1.1) rotate(0deg) !important; z-index: 100; }

        /* Positioning the 4 corner frames */
        .top-left     { top: 20px; left: 20px; transform: rotate(-8deg); }
        .top-right    { top: 20px; right: 20px; transform: rotate(8deg); animation-delay: 0.5s; }
        .bottom-left  { bottom: 20px; left: 20px; transform: rotate(5deg); animation-delay: 1s; }
        .bottom-right { bottom: 20px; right: 20px; transform: rotate(-5deg); animation-delay: 1.5s; }

        @keyframes floatFrame {
            0%, 100% { translateY(0); }
            50% { transform: translateY(-10px) rotate(var(--r, 0deg)); }
        }

        /* --- FLIPPING CARD --- */
        .card-wrapper {
            width: 320px;
            height: 420px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .card-wrapper.open { transform: rotateY(180deg); }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            background: #fff;
            border: 4px solid white;
        }

        .back-side {
            transform: rotateY(180deg);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            background: #fffdfd;
        }

        .heart-btn {
            font-size: 80px;
            color: var(--primary);
            animation: heartbeat 1.4s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- BACKGROUND DECOR --- */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 40px;
            height: 55px;
            border-radius: 50%;
            opacity: 0.7;
            animation: floatAway 9s linear infinite;
        }

        @keyframes floatAway {
            0% { bottom: -100px; transform: translateX(0); }
            100% { bottom: 110vh; transform: translateX(80px); }
        }
    </style>
</head>
<body>

    <div class="frame top-left" style="--r: -8deg;"><img src="1.jpg" alt="Memory 1"></div>
    <div class="frame top-right" style="--r: 8deg;"><img src="2.jpg" alt="Memory 2"></div>
    <div class="frame bottom-left" style="--r: 5deg;"><img src="3.jpg" alt="Memory 3"></div>
    <div class="frame bottom-right" style="--r: -5deg;"><img src="4.jpg" alt="Memory 4"></div>

    <div class="card-wrapper" id="bdayCard" onclick="handleFlip()">
        <div class="card-side front-side">
            <div class="heart-btn">❤️</div>
            <h2 style="color: var(--accent); margin-top: 15px;">To Ruby</h2>
            <p style="color: #999; font-size: 0.9rem;">Click the Heart</p>
        </div>
        <div class="card-side back-side">
            <h1 style="color: var(--accent); margin-bottom: 10px;">Happy Birthday!</h1>
            <p style="color: #444; line-height: 1.6;">
                To the most amazing sister!<br><br>
                May your year be full of happiness, coding, and success. 
            </p>
            <p style="margin-top: 20px; font-weight: bold; color: var(--primary);">Love, Aadi</p>
        </div>
    </div>

    <script>
        function handleFlip() {
            const card = document.getElementById('bdayCard');
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                triggerPopper();
            }
        }

        function triggerPopper() {
            for(let i=0; i<60; i++) {
                const conf = document.createElement('div');
                conf.style.cssText = `
                    position: fixed; width: 8px; height: 8px;
                    background: hsl(${Math.random()*360}, 100%, 50%);
                    left: 50%; top: 50%; border-radius: 2px; z-index: 2000;
                `;
                document.body.appendChild(conf);
                
                const angle = Math.random() * Math.PI * 2;
                const tx = Math.cos(angle) * (200 + Math.random() * 300);
                const ty = Math.sin(angle) * (200 + Math.random() * 300);

                conf.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px)`, opacity: 0 }
                ], { duration: 2000, easing: 'ease-out' });

                setTimeout(() => conf.remove(), 2000);
            }
        }

        // Generate Balloons
        const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#ffffff'];
        for(let i=0; i<12; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            b.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
