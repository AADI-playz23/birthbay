<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ruby!</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --accent: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- LARGE PHOTO FRAMES --- */
        .frame {
            position: absolute;
            width: 160px; /* Increased size */
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
            z-index: 5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: float 6s ease-in-out infinite;
        }

        .frame img {
            width: 100%;
            height: 180px; /* Increased height */
            object-fit: cover;
            border-radius: 2px;
        }

        /* Hover/Tap Zoom Effect */
        .frame:hover {
            transform: scale(1.5) rotate(0deg) !important;
            z-index: 200;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--r)); }
            50% { transform: translateY(-15px) rotate(var(--r)); }
        }

        /* Desktop Positioning (Spaced out for bigger frames) */
        .f1 { top: 5%; left: 3%; --r: -10deg; }
        .f2 { top: 5%; right: 3%; --r: 10deg; }
        .f3 { bottom: 5%; left: 3%; --r: 8deg; }
        .f4 { bottom: 5%; right: 3%; --r: -8deg; }
        .f5 { top: 35%; left: 1%; --r: 5deg; }
        .f6 { top: 35%; right: 1%; --r: -5deg; }
        .f7 { top: -2%; left: 40%; --r: 2deg; }
        .f8 { bottom: -2%; left: 40%; --r: -2deg; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .frame {
                width: 110px; /* Balanced size for mobile */
                padding: 6px 6px 20px 6px;
            }
            .frame img { height: 120px; }
            
            /* Repositioning for mobile to prevent overlap */
            .f1 { top: 2%; left: 2%; }
            .f2 { top: 2%; right: 2%; }
            .f3 { bottom: 2%; left: 2%; }
            .f4 { bottom: 2%; right: 2%; }
            .f5 { top: 25%; left: -5%; }
            .f6 { top: 25%; right: -5%; }
            .f7 { top: 1%; left: 35%; }
            .f8 { bottom: 1%; left: 35%; }
            
            .frame:hover { transform: scale(1.8) !important; }
        }

        /* --- MAIN CARD --- */
        .card-wrapper {
            width: 300px;
            height: 400px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 150; /* Above frames */
        }

        .card-wrapper.open { transform: rotateY(180deg); }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            background: #fff;
            border: 5px solid white;
        }

        .back-side {
            transform: rotateY(180deg);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .heart-btn {
            font-size: 80px;
            color: var(--primary);
            animation: heartbeat 1.4s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- BALLOONS --- */
        .balloon {
            position: absolute;
            bottom: -150px;
            width: 40px;
            height: 55px;
            border-radius: 50%;
            opacity: 0.5;
            animation: floatAway 12s linear infinite;
        }

        @keyframes floatAway {
            to { bottom: 120vh; transform: translateX(100px); }
        }
    </style>
</head>
<body>

    <div class="frame f1"><img src="1.jpg"></div>
    <div class="frame f2"><img src="2.jpg"></div>
    <div class="frame f3"><img src="3.jpg"></div>
    <div class="frame f4"><img src="4.jpg"></div>
    <div class="frame f5"><img src="5.jpg"></div>
    <div class="frame f6"><img src="6.jpg"></div>
    <div class="frame f7"><img src="7.jpg"></div>
    <div class="frame f8"><img src="8.jpg"></div>

    <div class="card-wrapper" id="bdayCard" onclick="handleFlip()">
        <div class="card-side front-side">
            <div class="heart-btn">❤️</div>
            <h2 style="color: var(--accent); margin-top: 20px;">For Ruby</h2>
            <p style="color: #888;">Tap to Open</p>
        </div>
        <div class="card-side back-side">
            <h1 style="color: var(--accent);">Happy Birthday!</h1>
            <p style="color: #444; line-height: 1.6;">
                To my dearest sister Ruby,<br><br>
                May your day be filled with love and your year filled with amazing moments. You are truly special!
            </p>
            <p style="margin-top: 25px; font-weight: bold; color: var(--primary);">~ Aadi</p>
        </div>
    </div>

    <script>
        function handleFlip() {
            const card = document.getElementById('bdayCard');
            card.classList.toggle('open');
            if(card.classList.contains('open')) {
                triggerPopper();
            }
        }

        function triggerPopper() {
            for(let i=0; i<70; i++) {
                const conf = document.createElement('div');
                conf.style.cssText = `
                    position: fixed; width: 8px; height: 8px;
                    background: hsl(${Math.random()*360}, 100%, 50%);
                    left: 50%; top: 50%; z-index: 2000;
                `;
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2;
                const dist = 200 + Math.random() * 400;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                conf.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 2000, easing: 'ease-out' });
                setTimeout(() => conf.remove(), 2000);
            }
        }

        const colors = ['#ff4d6d', '#ffb3c1', '#ffffff'];
        for(let i=0; i<12; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            b.style.animationDelay = Math.random() * 12 + 's';
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
