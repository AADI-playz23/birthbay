<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ruby!</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --accent: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* --- PHOTO FRAMES CONTAINER --- */
        .frames-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .frame {
            position: absolute;
            width: 100px;
            background: white;
            padding: 5px 5px 15px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            pointer-events: auto;
            animation: float 5s ease-in-out infinite;
        }

        .frame img {
            width: 100%;
            height: 110px;
            object-fit: cover;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--r)); }
            50% { transform: translateY(-10px) rotate(var(--r)); }
        }

        /* Desktop Positioning (8 Frames) */
        .f1 { top: 5%; left: 5%; --r: -8deg; }
        .f2 { top: 5%; right: 5%; --r: 8deg; }
        .f3 { bottom: 5%; left: 5%; --r: 5deg; }
        .f4 { bottom: 5%; right: 5%; --r: -5deg; }
        .f5 { top: 40%; left: 2%; --r: 10deg; }
        .f6 { top: 40%; right: 2%; --r: -10deg; }
        .f7 { top: 2%; left: 45%; --r: 2deg; }
        .f8 { bottom: 2%; left: 45%; --r: -2deg; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 600px) {
            .frame {
                width: 70px;
                padding: 3px 3px 10px 3px;
            }
            .frame img { height: 75px; }
            
            /* Tighten positions for mobile so they don't overlap the card too much */
            .f1 { top: 2%; left: 2%; }
            .f2 { top: 2%; right: 2%; }
            .f3 { bottom: 2%; left: 2%; }
            .f4 { bottom: 2%; right: 2%; }
            .f5 { top: 25%; left: 1%; }
            .f6 { top: 25%; right: 1%; }
            .f7 { bottom: 25%; left: 1%; }
            .f8 { bottom: 25%; right: 1%; }
        }

        /* --- MAIN CARD --- */
        .card-wrapper {
            width: 280px;
            height: 380px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        @media (max-width: 350px) {
            .card-wrapper { width: 240px; height: 340px; }
        }

        .card-wrapper.open { transform: rotateY(180deg); }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            background: #fff;
            border: 4px solid white;
        }

        .back-side {
            transform: rotateY(180deg);
            padding: 20px;
            text-align: center;
            background: #fffdfd;
        }

        .heart-btn {
            font-size: 70px;
            color: var(--primary);
            animation: heartbeat 1.4s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- BALLOONS --- */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 30px;
            height: 40px;
            border-radius: 50%;
            opacity: 0.6;
            animation: floatAway 10s linear infinite;
        }

        @keyframes floatAway {
            to { bottom: 110vh; transform: translateX(50px); }
        }
    </style>
</head>
<body>

    <div class="frames-container">
        <div class="frame f1"><img src="1.jpg"></div>
        <div class="frame f2"><img src="2.jpg"></div>
        <div class="frame f3"><img src="3.jpg"></div>
        <div class="frame f4"><img src="4.jpg"></div>
        <div class="frame f5"><img src="5.jpg"></div>
        <div class="frame f6"><img src="6.jpg"></div>
        <div class="frame f7"><img src="7.jpg"></div>
        <div class="frame f8"><img src="8.jpg"></div>
    </div>

    <div class="card-wrapper" id="bdayCard" onclick="handleFlip()">
        <div class="card-side front-side">
            <div class="heart-btn">❤️</div>
            <h2 style="color: var(--accent); margin-top: 10px;">For Ruby</h2>
            <p style="color: #999; font-size: 0.8rem;">Tap the Heart</p>
        </div>
        <div class="card-side back-side">
            <h2 style="color: var(--accent); margin-bottom: 5px;">Happy Birthday!</h2>
            <p style="color: #444; line-height: 1.4; font-size: 0.95rem;">
                To the most amazing sister!<br><br>
                I hope your special day is as wonderful as you are. Keep being awesome!
            </p>
            <p style="margin-top: 15px; font-weight: bold; color: var(--primary);">Love, Aadi</p>
        </div>
    </div>

    <script>
        function handleFlip() {
            const card = document.getElementById('bdayCard');
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                triggerPopper();
            }
        }

        function triggerPopper() {
            for(let i=0; i<50; i++) {
                const conf = document.createElement('div');
                conf.style.cssText = `
                    position: fixed; width: 6px; height: 6px;
                    background: hsl(${Math.random()*360}, 100%, 50%);
                    left: 50%; top: 50%; z-index: 2000;
                `;
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2;
                const tx = Math.cos(angle) * (150 + Math.random() * 200);
                const ty = Math.sin(angle) * (150 + Math.random() * 200);
                conf.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' });
                setTimeout(() => conf.remove(), 1500);
            }
        }

        const colors = ['#ff4d6d', '#ffb3c1', '#ffffff'];
        for(let i=0; i<10; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            b.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
