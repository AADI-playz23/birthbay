<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Ruby!</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --accent: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #fff0f3 0%, #ffccd5 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* --- BACKGROUND BALLOONS --- */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 30px;
            height: 40px;
            border-radius: 50%;
            opacity: 0.4;
            z-index: 0;
            animation: floatAway 10s linear infinite;
        }
        @keyframes floatAway { to { bottom: 110vh; transform: translateX(50px); } }

        /* --- PHOTO SYSTEM --- */
        .frames-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .frame {
            position: absolute;
            background: white;
            padding: 8px 8px 25px 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            pointer-events: auto;
            transition: transform 0.3s;
            z-index: 5;
        }

        .frame img { width: 100%; height: 100%; object-fit: cover; }

        /* Desktop Layout (Corners) */
        @media (min-width: 769px) {
            .frame { width: 140px; height: 160px; }
            .f1 { top: 5%; left: 5%; transform: rotate(-8deg); }
            .f2 { top: 5%; right: 5%; transform: rotate(8deg); }
            .f3 { bottom: 5%; left: 5%; transform: rotate(5deg); }
            .f4 { bottom: 5%; right: 5%; transform: rotate(-5deg); }
            .f5 { top: 40%; left: 2%; transform: rotate(10deg); }
            .f6 { top: 40%; right: 2%; transform: rotate(-10deg); }
            .f7 { top: 2%; left: 45%; }
            .f8 { bottom: 2%; left: 45%; }
            .frame:hover { transform: scale(1.4) rotate(0deg) !important; z-index: 200; }
        }

        /* Mobile Layout (Scrollable Strip) */
        @media (max-width: 768px) {
            .frames-layer {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                pointer-events: none;
            }
            .mobile-scroll-container {
                display: flex;
                overflow-x: auto;
                padding: 20px;
                gap: 15px;
                pointer-events: auto;
                background: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(5px);
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .mobile-scroll-container::-webkit-scrollbar { display: none; }
            
            .frame {
                position: relative;
                flex: 0 0 120px;
                height: 150px;
                top: auto !important; left: auto !important; right: auto !important; bottom: auto !important;
                transform: rotate(0deg) !important;
            }
            
            .card-wrapper {
                margin-top: -150px; /* Pull card up away from scroll bar */
            }
        }

        /* --- THE CARD --- */
        .card-wrapper {
            width: 280px;
            height: 380px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .card-wrapper.open { transform: rotateY(180deg); }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            background: #fff;
            border: 5px solid white;
        }

        .back-side {
            transform: rotateY(180deg);
            padding: 25px;
            text-align: center;
        }

        .heart-btn {
            font-size: 80px;
            color: var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div class="frames-layer">
        <div class="mobile-scroll-container">
            <div class="frame f1"><img src="1.jpg"></div>
            <div class="frame f2"><img src="2.jpg"></div>
            <div class="frame f3"><img src="3.jpg"></div>
            <div class="frame f4"><img src="4.jpg"></div>
            <div class="frame f5"><img src="5.jpg"></div>
            <div class="frame f6"><img src="6.jpg"></div>
            <div class="frame f7"><img src="7.jpg"></div>
            <div class="frame f8"><img src="8.jpg"></div>
        </div>
    </div>

    <div class="card-wrapper" id="bdayCard" onclick="handleFlip()">
        <div class="card-side front-side">
            <div class="heart-btn">❤️</div>
            <h2 style="color: var(--accent);">For Ruby</h2>
            <p style="color: #999;">Tap to open</p>
        </div>
        <div class="card-side back-side">
            <h2 style="color: var(--accent); margin: 0;">Happy Birthday!</h2>
            <p style="color: #444; line-height: 1.5;">
                Wishing you a day as wonderful as you are. You're the best sister anyone could ask for!
            </p>
            <p style="font-weight: bold; color: var(--primary);">~ Aadi</p>
        </div>
    </div>

    <script>
        function handleFlip() {
            const card = document.getElementById('bdayCard');
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                triggerPopper();
            } else {
                card.classList.remove('open');
            }
        }

        function triggerPopper() {
            for(let i=0; i<60; i++) {
                const conf = document.createElement('div');
                conf.style.cssText = `
                    position: fixed; width: 8px; height: 8px;
                    background: hsl(${Math.random()*360}, 100%, 50%);
                    left: 50%; top: 50%; z-index: 2000;
                `;
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2;
                const tx = Math.cos(angle) * (150 + Math.random() * 250);
                const ty = Math.sin(angle) * (150 + Math.random() * 250);
                conf.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' });
                setTimeout(() => conf.remove(), 1500);
            }
        }

        // Balloons
        const colors = ['#ff4d6d', '#ffccd5', '#ffffff'];
        for(let i=0; i<8; i++) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 100 + 'vw';
            b.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
            b.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
